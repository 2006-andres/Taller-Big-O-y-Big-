<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestor de Contactos</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 860px; margin: 40px auto; padding: 0 16px; background: #0f1117; color: #e8ecf4; }
    .card { background: #181c27; border: 1px solid #2a3049; border-radius: 16px; padding: 24px; }
    h1 { margin-top: 0; }
    .row { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); margin-top: 16px; }
    label { display: block; font-size: 13px; margin-bottom: 6px; color: #8a93b2; }
    input, select, button { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid #3a4460; background: #1f2435; color: #e8ecf4; }
    button { background: #4f8ef7; border: none; cursor: pointer; font-weight: 700; margin-top: 16px; }
    .status { margin-top: 16px; padding: 12px; border-radius: 10px; background: #1f2435; color: #8a93b2; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Gestor de Contactos</h1>
    <p>Sube un CSV o TXT delimitado por comas. El backend devolverá un archivo descargable con este orden fijo de columnas: cedula, nombre1, nombre2, apellido1, apellido2, Numcelular, correo.</p>

    <label for="fileInput">Archivo</label>
    <input type="file" id="fileInput" accept=".csv,.txt" />

    <div class="row">
      <div>
        <label for="sortField">Ordenar por</label>
        <select id="sortField">
          <option value="cedula">Cédula</option>
          <option value="nombre1">Nombre 1</option>
          <option value="nombre2">Nombre 2</option>
          <option value="apellido1" selected>Apellido 1</option>
          <option value="apellido2">Apellido 2</option>
          <option value="Numcelular">Celular</option>
          <option value="correo">Correo</option>
        </select>
      </div>
      <div>
        <label for="sortDirection">Dirección</label>
        <select id="sortDirection">
          <option value="asc">Ascendente</option>
          <option value="desc">Descendente</option>
        </select>
      </div>
      <div>
        <label for="search">Filtro opcional</label>
        <input type="text" id="search" placeholder="Nombre, cédula, correo..." />
      </div>
    </div>

    <button id="downloadBtn">Procesar y descargar CSV</button>
    <div class="status" id="status">Listo para procesar.</div>
  </div>

  <script>
    const API = 'http://localhost:3001/api';
    const fileInput = document.getElementById('fileInput');
    const sortField = document.getElementById('sortField');
    const sortDirection = document.getElementById('sortDirection');
    const search = document.getElementById('search');
    const downloadBtn = document.getElementById('downloadBtn');
    const statusBox = document.getElementById('status');

    function setStatus(text) {
      statusBox.textContent = text;
    }

    downloadBtn.addEventListener('click', async () => {
      const file = fileInput.files[0];
      if (!file) {
        setStatus('Selecciona un archivo primero.');
        return;
      }

      try {
        downloadBtn.disabled = true;
        setStatus('Procesando archivo y descargando CSV...');

        const formData = new FormData();
        formData.append('file', file);
        formData.append('sortField', sortField.value);
        formData.append('sortDirection', sortDirection.value);
        formData.append('search', search.value);

        const response = await fetch(`${API}/upload`, {
          method: 'POST',
          body: formData,
        });

        if (!response.ok) {
          const text = await response.text();
          throw new Error(text || 'No se pudo procesar el archivo.');
        }

        const blob = await response.blob();
        let fileName = 'contactos_ordenados.csv';
        const disposition = response.headers.get('content-disposition') || '';
        const match = disposition.match(/filename="?([^\"]+)"?/i);
        if (match && match[1]) fileName = match[1];

        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(url);

        setStatus(`Descarga completada: ${fileName}`);
      } catch (error) {
        setStatus(`Error: ${error.message}`);
      } finally {
        downloadBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
